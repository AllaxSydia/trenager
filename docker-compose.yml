version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: trenager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=trenager
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - code_volume:/tmp/code_executor
    depends_on:
      - db  # ← исправил синтаксис
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:  # ← добавил определение сети
  app-network:
    driver: bridge

volumes:
  code_volume:
  postgres_data: